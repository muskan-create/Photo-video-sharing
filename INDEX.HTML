<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Speech to Text</title>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body{
        padding: 12px 8px;
        height: 100vh;
        background-color: antiquewhite;
    }
    .main-container{
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    .main-container h1{
        margin-top: 2rem;
        text-align: center;
        font-size: 2rem;
        color: black;
    }
    .text{
        margin-top: 3rem;
        outline: none;
        border: transparent;
        padding: 12px;
        font-size: 20px;
        height: 60%;
        max-height: 60%;
        width: 80%;
        max-width: 80%;
        resize: none;
        overflow-y: auto;
    }
    .start-stop{
        cursor: pointer;
        padding: 12px;
        font-size: 18px;
        margin-top: 1rem;
        outline: none;
        border: none;
        border-radius: 10px;
        background-color: green;
        color: white;
    }
    
    @media (max-width: 426px) {
        .text{
            font-size: 14px;
        }
    }
</style>
<body>
    <div class="main-container">
        <h1>
            Speech To Text
        </h1>
        <textarea name="text" class="text"placeholder="Converted text will appear here" readonly></textarea>
        <button class="start-stop">Start Converting</button>
    </div>
</body>
<script src="script.js"></script>
</html>
